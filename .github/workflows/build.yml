        XML
        
        # AndroidManifest.xml
        cat > app/src/main/AndroidManifest.xml << 'MAN'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
        
            <uses-permission android:name="android.permission.PACKAGE_USAGE_STATS"/>
            <uses-permission android:name="moe.shizuku.manager.permission.API_V23"/>
        
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="FF DPI Module">
        
                <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
        
                <service android:name=".MonitorService" android:exported="true"/>
        
            </application>
        </manifest>
        MAN
        
        # Icon
        echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==' | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
        
        # strings.xml
        cat > app/src/main/res/values/strings.xml << 'STR'
        <resources>
            <string name="app_name">FF DPI Module</string>
        </resources>
        STR
        
        # app/build.gradle
        cat > app/build.gradle << 'GRAD'
        plugins {
            id('com.android.application')
        }
        android {
            namespace 'com.ffdpi'
            compileSdk 34
            defaultConfig {
                applicationId 'com.ffdpi'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'dev.rikka.shizuku:api:13.1.5'
        }
        GRAD
        
        # build.gradle (project)
        cat > build.gradle << 'PROJ'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
            }
        }
        PROJ
        
        # settings.gradle
        echo 'rootProject.name = "FFDPI"' > settings.gradle
        echo 'include ":app"' >> settings.gradle
        
        # gradle.properties
        echo 'android.useAndroidX=true' > gradle.properties
        
    - name: Setup Gradle
      run: |
        mkdir -p gradle/wrapper
        echo 'distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists' > gradle/wrapper/gradle-wrapper.properties
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.jar
        echo '#!/bin/sh
        exec java -classpath "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
        chmod +x gradlew
    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FF-DPI-Module
        path: app/build/outputs/apk/debug/*.apk
