name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Create app
      run: |
        mkdir -p app/src/main/java/com/ffdpi
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/values
        
        # MainActivity.java
        cat > app/src/main/java/com/ffdpi/MainActivity.java << 'JAVA1'
        package com.ffdpi;
        
        import android.app.Activity;
        import android.app.AppOpsManager;
        import android.content.Context;
        import android.content.Intent;
        import android.content.SharedPreferences;
        import android.content.pm.PackageManager;
        import android.os.Bundle;
        import android.provider.Settings;
        import android.widget.*;
        import dev.rikka.shizuku.Shizuku;
        
        public class MainActivity extends Activity {
        
            private EditText dpiInput;
            private TextView statusText;
            private Button startBtn, saveBtn;
            private boolean isRunning = false;
        
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
        
                dpiInput = findViewById(R.id.dpiInput);
                statusText = findViewById(R.id.statusText);
                startBtn = findViewById(R.id.startBtn);
                saveBtn = findViewById(R.id.saveBtn);
        
                // Load saved DPI
                SharedPreferences prefs = getSharedPreferences("ff_dpi", MODE_PRIVATE);
                int savedDpi = prefs.getInt("dpi_value", 480);
                dpiInput.setText(String.valueOf(savedDpi));
        
                // Check Usage Stats permission
                if (!hasUsageStatsPermission()) {
                    startActivity(new Intent(Settings.ACTION_USAGE_ACCESS_SETTINGS));
                }
        
                checkShizuku();
        
                saveBtn.setOnClickListener(v -> {
                    String dpiStr = dpiInput.getText().toString().trim();
                    if (!dpiStr.isEmpty()) {
                        int dpi = Integer.parseInt(dpiStr);
                        SharedPreferences prefs1 = getSharedPreferences("ff_dpi", MODE_PRIVATE);
                        prefs1.edit().putInt("dpi_value", dpi).apply();
                        Toast.makeText(this, "DPI set to: " + dpi, Toast.LENGTH_SHORT).show();
                        statusText.setText("✅ DPI saved: " + dpi);
                    }
                });
        
                startBtn.setOnClickListener(v -> {
                    if (!isRunning) {
                        startService(new Intent(this, MonitorService.class));
                        isRunning = true;
                        startBtn.setText("⏹️ STOP MODULE");
                        statusText.setText("✅ Monitoring Free Fire... DPI will change automatically");
                    } else {
                        stopService(new Intent(this, MonitorService.class));
                        isRunning = false;
                        startBtn.setText("▶️ START MODULE");
                        statusText.setText("⏹️ Module stopped");
                    }
                });
            }
        
            private void checkShizuku() {
                try {
                    if (Shizuku.pingBinder()) {
                        if (Shizuku.checkSelfPermission() == PackageManager.PERMISSION_GRANTED) {
                            statusText.setText("✅ Shizuku ready! Set your DPI and Start Module");
                        } else {
                            statusText.setText("⚠️ Requesting Shizuku permission...");
                            Shizuku.requestPermission(1001);
                            Shizuku.addRequestPermissionResultListener((code, result) -> {
                                if (result == PackageManager.PERMISSION_GRANTED) {
                                    runOnUiThread(() -> statusText.setText("✅ Permission granted! Ready"));
                                }
                            });
                        }
                    } else {
                        statusText.setText("❌ Shizuku not running!\nOpen Shizuku app and start service");
                    }
                } catch (Exception e) {
                    statusText.setText("❌ Error: " + e.getMessage());
                }
            }
        
            private boolean hasUsageStatsPermission() {
                AppOpsManager appOps = (AppOpsManager) getSystemService(Context.APP_OPS_SERVICE);
                int mode = appOps.checkOpNoThrow(AppOpsManager.OPSTR_GET_USAGE_STATS,
                        android.os.Process.myUid(), getPackageName());
                return mode == AppOpsManager.MODE_ALLOWED;
            }
        
            @Override
            protected void onResume() {
                super.onResume();
                checkShizuku();
            }
        }
        JAVA1
        
        # MonitorService.java
        cat > app/src/main/java/com/ffdpi/MonitorService.java << 'JAVA2'
        package com.ffdpi;
        
        import android.app.Service;
        import android.app.usage.UsageStats;
        import android.app.usage.UsageStatsManager;
        import android.content.Intent;
        import android.content.SharedPreferences;
        import android.os.Handler;
        import android.os.IBinder;
        import android.os.Looper;
        import android.widget.Toast;
        import java.util.List;
        import dev.rikka.shizuku.Shizuku;
        
        public class MonitorService extends Service {
        
            private Handler handler = new Handler(Looper.getMainLooper());
            private boolean isFFOpen = false;
            private int currentDPI = 480;
        
            private Runnable checker = new Runnable() {
                @Override
                public void run() {
                    checkForegroundApp();
                    handler.postDelayed(this, 1000);
                }
            };
        
            @Override
            public int onStartCommand(Intent intent, int flags, int startId) {
                // Load saved DPI
                SharedPreferences prefs = getSharedPreferences("ff_dpi", MODE_PRIVATE);
                currentDPI = prefs.getInt("dpi_value", 480);
                handler.post(checker);
                Toast.makeText(this, "FF DPI Module Started - DPI: " + currentDPI, Toast.LENGTH_SHORT).show();
                return START_STICKY;
            }
        
            private void checkForegroundApp() {
                try {
                    UsageStatsManager usm = (UsageStatsManager) getSystemService(USAGE_STATS_SERVICE);
                    long time = System.currentTimeMillis();
                    List<UsageStats> stats = usm.queryUsageStats(
                            UsageStatsManager.INTERVAL_DAILY, time - 10000, time);
        
                    if (stats != null) {
                        String topApp = "";
                        long lastTime = 0;
                        for (UsageStats s : stats) {
                            if (s.getLastTimeUsed() > lastTime) {
                                lastTime = s.getLastTimeUsed();
                                topApp = s.getPackageName();
                            }
                        }
        
                        // Free Fire package: com.dts.freefireth
                        if (topApp.equals("com.dts.freefireth") && !isFFOpen) {
                            isFFOpen = true;
                            runCommand("wm density " + currentDPI);
                        }
                        else if (!topApp.equals("com.dts.freefireth") && isFFOpen) {
                            isFFOpen = false;
                            runCommand("wm density reset");
                        }
                    }
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }
        
            private void runCommand(String cmd) {
                new Thread(() -> {
                    try {
                        Process p = Shizuku.newProcess(new String[]{"sh", "-c", cmd}, null, null);
                        p.waitFor();
                    } catch (Exception e) {
                        e.printStackTrace();
                    }
                }).start();
            }
        
            @Override
            public void onDestroy() {
                super.onDestroy();
                handler.removeCallbacks(checker);
                // Reset DPI when service stops
                runCommand("wm density reset");
                Toast.makeText(this, "FF DPI Module Stopped", Toast.LENGTH_SHORT).show();
            }
        
            @Override
            public IBinder onBind(Intent intent) {
                return null;
            }
        }
        JAVA2
        
        # activity_main.xml
        cat > app/src/main/res/layout/activity_main.xml << 'XML'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
